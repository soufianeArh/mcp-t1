        - generic [ref=e347]:
          - paragraph [ref=e348]: Debbie Major’s banoffee pie recipe respects the original 1970s recipe, made with sweetened pastry rather than a biscuit-crumb base. And of course, it’s filled with caramel, banana and whipped cream…
          - paragraph [ref=e349]: Ian Dowding, chef of the (now closed) Hungry Monk restaurant in Jevington, East Sussex, along with owner Nigel Mackenzie, is credited with inventing the banoffee pie in the early 1970s. The recipe, says Ian, evolved over time and was based on an American-style coffee/toffee pie made by a work colleague. Ian’s idea came about after a conversation with his sister about boiling unopened tins of condensed milk for hours until it turned to toffee. The brainwave of partnering that sauce with bananas, together with the original coffee-flavoured cream, plus a grated chocolate topping, came together and the now world-famous pie was created. The drizzled chocolate we’ve added isn’t traditional but is less bitter than the original freshly ground coffee decoration.
          - paragraph [ref=e350]:
            - text: Have you seen our epic
            - link "banoffee cheesecake" [ref=e351] [cursor=pointer]:
              - /url: https://www.deliciousmagazine.co.uk/recipes/banoffee-cheesecake/
            - text: "?"
