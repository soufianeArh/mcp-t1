              - paragraph [ref=e382]: For the topping
              - list [ref=e383]:
                - listitem [ref=e384]: 300ml double cream
                - listitem [ref=e385]: 1 tsp instant coffee powder (not granules)
                - listitem [ref=e386]: 2 tsp caster sugar
                - listitem [ref=e387]: 4 large or 5 medium ripe bananas
                - listitem [ref=e388]: 30g dark chocolate, chopped
              - paragraph [ref=e389]: You’ll also need…
