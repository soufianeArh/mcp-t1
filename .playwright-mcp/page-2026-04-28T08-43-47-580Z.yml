            - heading "Before you start" [level=2] [ref=e356]
            - paragraph [ref=e357]: There’s nothing worse than a soggy bottom, so preheating the baking sheet guarantees a crisp pastry base.
            - paragraph [ref=e358]: Stir the sauce continuously to prevent it from scorching on the bottom of the pan.
            - paragraph [ref=e359]: Whip the cream until it just stands in soft peaks when the beaters are removed. It will firm up further in the fridge.
            - paragraph [ref=e360]:
              - strong [ref=e361]: How to jazz up your banoffee
            - list [ref=e362]:
              - listitem [ref=e363]: Add a little booze to the toffee sauce. Dark rum goes very well with bananas.
              - listitem [ref=e364]: Add orange zest and a squeeze of orange juice to the toffee sauce or the whipped cream.
              - listitem [ref=e365]: Use a no-bake cheesecake base instead of the pastry, adding a few lightly toasted chopped nuts to the mixture (pecans are particularly good).
